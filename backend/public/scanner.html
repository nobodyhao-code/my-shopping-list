<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收银台模拟器</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 5px; font-size: 20px; text-align: center; box-sizing: border-box; letter-spacing: 2px; }
        button { width: 100%; padding: 15px; background: #ff5000; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; font-weight: bold; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>收银台扫描模拟器</h2>
        <p style="color: #666; font-size: 14px;">请在此输入顾客手机上的 10 位数字码</p>
        
        <input type="text" id="barcodeInput" placeholder="1234567890" maxlength="10">
        <button onclick="verifyBarcode()">模拟扫描</button>
        
        <div id="resultBox" class="result"></div>
    </div>

    <script>
        async function verifyBarcode() {
            const barcode = document.getElementById('barcodeInput').value.trim();
            
            if (barcode.length !== 10 || isNaN(barcode)) {
                showResult(false, '请输入有效的 10 位数字码');
                return;
            }

            try {
                const res = await fetch('/api/verify-loyalty', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ barcode })
                });
                const data = await res.json();

                if (data.success) {
                    showResult(true, `验证成功！<br>当前顾客身份：${data.username}`);
                } else {
                    showResult(false, `验证失败：${data.message}`);
                }
            } catch (e) {
                showResult(false, '网络连接失败');
            }
        }

        function showResult(isSuccess, text) {
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            resultBox.innerHTML = text;
            resultBox.className = isSuccess ? 'result success' : 'result error';
        }
    </script>
</body>
</html>
