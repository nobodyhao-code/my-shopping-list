<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping App Login</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .lang-select { position: absolute; top: 20px; right: 20px; padding: 5px; border-radius: 5px; }
        .card { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 300px; text-align: center; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-login { background-color: #ff5000; color: white; }
        .btn-reg { background-color: #eee; color: #333; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1000; }
        .toast.show { opacity: 1; top: 40px; }
    </style>
</head>
<body>
    <select class="lang-select" id="lang-select" onchange="changeLang()">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="fi">Suomi</option>
    </select>

    <div class="card">
        <h2 id="t-title">登录你的清单</h2>
        <input type="text" id="username" placeholder="输入用户名">
        <input type="password" id="password" placeholder="输入密码">
        <button class="btn-login" id="t-login" onclick="auth('login')">登录</button>
        <button class="btn-reg" id="t-reg" onclick="auth('register')">注册</button>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        const dict = {
            zh: { title: '登录你的清单', user: '输入用户名', pass: '输入密码', login: '登录', reg: '注册', err1: '请填写完整', err2: '账号或密码错误', exists: '用户名已存在', regok: '注册成功' },
            en: { title: 'Login to App', user: 'Username', pass: 'Password', login: 'Login', reg: 'Register', err1: 'Fill all fields', err2: 'Invalid credentials', exists: 'User exists', regok: 'Registered' },
            fi: { title: 'Kirjaudu sisään', user: 'Käyttäjätunnus', pass: 'Salasana', login: 'Kirjaudu', reg: 'Rekisteröidy', err1: 'Täytä kentät', err2: 'Virheelliset tiedot', exists: 'Käyttäjä on jo', regok: 'Rekisteröity' }
        };

        let currentLang = localStorage.getItem('lang') || 'zh';
        document.getElementById('lang-select').value = currentLang;
        updateUI();

        function changeLang() {
            currentLang = document.getElementById('lang-select').value;
            localStorage.setItem('lang', currentLang);
            updateUI();
        }

        function updateUI() {
            document.getElementById('t-title').innerText = dict[currentLang].title;
            document.getElementById('username').placeholder = dict[currentLang].user;
            document.getElementById('password').placeholder = dict[currentLang].pass;
            document.getElementById('t-login').innerText = dict[currentLang].login;
            document.getElementById('t-reg').innerText = dict[currentLang].reg;
        }

        let toastTimeout;
        function showToast(key) {
            const toast = document.getElementById('toast');
            toast.innerText = dict[currentLang][key] || key;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        async function auth(action) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (!username || !password) return showToast('err1');

            try {
                const res = await fetch(`/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (action === 'login') {
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem('username', username);
                        window.location.href = 'list.html';
                    } else showToast('err2');
                } else {
                    const text = await res.text();
                    showToast(text === 'exists' ? 'exists' : (text === 'success' ? 'regok' : text));
                }
            } catch (err) {
                showToast('Network Error');
            }
        }
    </script>
</body>
</html>
