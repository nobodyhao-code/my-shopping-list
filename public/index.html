<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的智能购物清单</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        input { width: 94%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        #list-container { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; display: none; }
        .item { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; flex-direction: column; }
        .item-name { font-weight: bold; color: #2c3e50; }
        .item-loc { font-size: 12px; color: #7f8c8d; }
        .badge { background: #e8f4fd; color: #007bff; padding: 4px 8px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div id="auth-section">
        <h2>🛍️ 登录清单</h2>
        <div class="input-group"><input type="email" id="email" placeholder="邮箱" value="test@test.com"></div>
        <div class="input-group"><input type="password" id="password" placeholder="密码" value="123"></div>
        <button onclick="login()">确认登录</button>
    </div>

    <div id="list-container">
        <h2>🛒 我的购物清单</h2>
        <div style="margin-bottom: 20px;">
    <input type="text" id="search-input" placeholder="输入商品名称（如：Milk, Bread）" oninput="searchProducts()">
    <div id="search-results" style="background: #fff; border: 1px solid #ddd; display: none; position: absolute; width: 350px; z-index: 100;">
        </div>
</div>
        <div id="items-list">
            </div>
        <button onclick="logout()" style="background:#6c757d; margin-top:10px;">退出登录</button>
    </div>
</div>

<script>
    const API_URL = ''; // 在 Render 上运行时，留空即可

    async function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (!username || !password) {
            alert('请填入用户名和密码');
            return;
        }

        try {
            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await response.text();
            alert(result); // 这里会弹出“注册成功”或“用户名已存在”
        } catch (error) {
            console.error('注册请求失败:', error);
            alert('网络错误，请稍后再试');
        }
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            if (data.success) {
                localStorage.setItem('username', username);
                window.location.href = 'list.html'; // 登录成功后跳转到清单页
            } else {
                alert(data.message);
            }
        } catch (error) {
            alert('登录出错');
        }
    }
</script>

</body>
</html>
